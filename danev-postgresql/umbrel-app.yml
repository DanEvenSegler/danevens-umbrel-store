description: >-
  PostgreSQL is a powerful, open-source object-relational database system with over 35 years of active development.
  It has earned a strong reputation for reliability, feature robustness, and performance. PostgreSQL is SQL-compliant and highly extensible, allowing you to define your own data types, index types, and functional languages.
  
  Key Features:
  - Robust Concurrency: Employs Multi-Version Concurrency Control (MVCC) to ensure high performance even under heavy loads.
  - Rich Data Types: Supports structured (SQL), semi-structured (JSON/JSONB, XML), key-value, and spatial data.
  - Active Community: Backed by a vast, global developer community and a massive ecosystem of extensions.
  - Highly Extensible: Easily add custom functions, operators, and procedural language plugins.

