id: danev-mongodb
name: mongodb
tagline: Document database server
icon: https://raw.githubusercontent.com/simple-icons/simple-icons/develop/icons/mongodb.svg
category: Development
version: "8"
port: 27017
description: >-
  MongoDB is a source-available, cross-platform, document-oriented NoSQL database designed for ease of development and scaling.
  Instead of using tables and rows as in relational databases, MongoDB utilizes JSON-like documents with dynamic schemas, making data integration in certain types of applications easier and faster.
  
  Key Features:
  - Document-Oriented: Store data in flexible, JSON-like documents.
  - High Performance: Support for embedded data models reduces I/O activity.
  - Rich Query Language: Strong support for CRUD operations, aggregations, text search, and geospatial queries.
  - Scalability: Horizontal scaling through sharding and high availability through replica sets.

